<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>🌟 Pintar Ceria - Game Edukasi Anak 🌟</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Background Animasi -->
    <div class="bg-bubbles">
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
        <div class="bubble"></div>
    </div>

    <!-- LAYAR 1: MENU UTAMA -->
    <div id="menu" class="screen active">
        <div class="maskot">🦁</div>
        <h1 class="judul-animasi">🌟 Pintar Ceria 🌟</h1>
        <p class="sub-judul">Yuk Belajar Sambil Bermain!</p>
        
        <div class="kategori-grid">
            <button class="btn-kategori" onclick="startGame(1, 50)">
                <div class="kategori-emoji">👶</div>
                <div class="kategori-nama">Usia 1-2 Tahun</div>
                <div class="kategori-level">Level 1-50</div>
            </button>
            <button class="btn-kategori" onclick="startGame(51, 150)">
                <div class="kategori-emoji">🧒</div>
                <div class="kategori-nama">Usia 2-3 Tahun</div>
                <div class="kategori-level">Level 51-150</div>
            </button>
            <button class="btn-kategori" onclick="startGame(151, 300)">
                <div class="kategori-emoji">👦</div>
                <div class="kategori-nama">Usia 3-4 Tahun</div>
                <div class="kategori-level">Level 151-300</div>
            </button>
            <button class="btn-kategori" onclick="startGame(301, 500)">
                <div class="kategori-emoji">👧</div>
                <div class="kategori-nama">Usia 4-5 Tahun</div>
                <div class="kategori-level">Level 301-500</div>
            </button>
            <button class="btn-kategori" onclick="startGame(501, 750)">
                <div class="kategori-emoji">👨</div>
                <div class="kategori-nama">Usia 5-6 Tahun</div>
                <div class="kategori-level">Level 501-750</div>
            </button>
            <button class="btn-kategori" onclick="startGame(751, 1000)">
                <div class="kategori-emoji">🎓</div>
                <div class="kategori-nama">Usia 6-7 Tahun</div>
                <div class="kategori-level">Level 751-1000</div>
            </button>
        </div>
    </div>

    <!-- LAYAR 2: PILIH LEVEL -->
    <div id="levels" class="screen">
        <div class="header-levels">
            <button class="btn-kembali" onclick="showMenu()">⬅️</button>
            <h2 id="levelTitle">Pilih Level</h2>
        </div>
        <div class="progress-bar">
            <div class="progress-fill" id="progressFill"></div>
        </div>
        <div id="levelGrid" class="level-grid"></div>
    </div>

    <!-- LAYAR 3: BERMAIN -->
    <div id="game" class="screen">
        <div class="header-game">
            <button class="btn-kembali" onclick="showLevels()">✕</button>
            <div class="level-badge">Level <span id="currentLevel">1</span></div>
            <div class="bintang-display" id="bintangDisplay">⭐⭐⭐</div>
        </div>
        
        <div class="soal-container">
            <div class="maskot-kecil" id="maskotGame">🦁</div>
            <div class="soal-bubble">
                <div id="questionText" class="soal-teks">Soal</div>
                <div id="questionDisplay" class="soal-display">🎯</div>
            </div>
        </div>

        <div id="options" class="options-grid"></div>
        
        <div id="feedback" class="feedback-animasi"></div>
    </div>

    <!-- LAYAR 4: SELESAI -->
    <div id="done" class="screen">
        <div class="selesai-container">
            <div class="trofi-animasi">🏆</div>
            <h1 class="selesai-judul">Hebat! 🎉</h1>
            <div id="stars" class="bintang-besar">⭐⭐⭐</div>
            <p id="doneText" class="selesai-teks">Kamu Luar Biasa!</p>
            <div class="tombol-aksi">
                <button class="btn-aksi btn-main" onclick="nextLevel()">➡️ Lanjut</button>
                <button class="btn-aksi btn-pilih" onclick="showLevels()"> Pilih Level</button>
            </div>
        </div>
    </div>

    <!-- Efek Konfeti -->
    <div id="confetti" class="confetti-container"></div>

    <script src="game.js"></script>
</body>
</html>
